    <style>
        .parallax-layer {
            position: fixed;

            z-index: -1;

            transition: transform 0.1s linear;

        }
        .p1 { font-size: 4rem; }
        .p2 { font-size: 5rem; }
        .p3 { font-size: 8rem; opacity: 0.3; }
        .p4 { font-size: 6rem; opacity: 0.3; }

        /* 活動日程 - 防止文字斷行 */
        .t-item {
            white-space: nowrap !important;
            min-width: 0 !important;
        }
        .t-desc {
            font-size: 0.85rem !important;
        }

        /* 手機版活動日程 - 縮小字體避免重疊 */
        @media (max-width: 600px) {
            .timeline-row {
                flex-wrap: wrap !important;
                gap: 4px !important;
            }
            .t-item {
                padding: 6px 6px !important;
                min-width: 0 !important;
            }
            .t-time {
                font-size: 0.7rem !important;
            }
            .t-desc {
                font-size: 0.6rem !important;
            }
            .t-line {
                min-width: 8px !important;
            }
        }

        /* 活動日程 - 當前時段高亮 */
        .t-item.t-now {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7) !important;
            border: 2.5px solid #f39c12 !important;
            box-shadow: 0 0 12px rgba(243, 156, 18, 0.4);
            animation: pulse-glow 2s ease-in-out infinite;
            transform: scale(1.08);
        }
        .t-item.t-done {
            opacity: 0.45;
            filter: grayscale(0.3);
        }
        .t-item.t-upcoming {
            opacity: 1;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(243, 156, 18, 0.3); }
            50% { box-shadow: 0 0 18px rgba(243, 156, 18, 0.6); }
        }

        /* 回到頂部按鈕 */
        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s, transform 0.2s;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        .back-to-top:hover {
            transform: scale(1.1);
        }

        /* 搜尋框清除按鈕 */
        .search-box {
            position: relative;
        }
        .search-clear {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #999;
            cursor: pointer;
            display: none;
            padding: 4px 8px;
        }
        .search-clear.show {
            display: block;
        }

        /* 海報圖片 */
        .booth-poster {
            width: 100%;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .booth-poster:hover {
            transform: scale(1.02);
        }
        /* 海報燈箱 */
        .poster-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .poster-overlay.active {
            display: flex;
        }
        .poster-overlay img {
            max-width: 92vw;
            max-height: 92vh;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);

            display: inline-block;
            margin: 8px 0 4px;
            padding: 6px 16px;
            background: linear-gradient(135deg, #e74c3c, #e67e22);

            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;

            { cls: "幼兒園雲朵班", name: "全部賣光光", type: "goods", loc: "幼兒園", desc: "二手物品、小吃(滷味)、造型泡澡球、幼兒自製作品" },
            { cls: "208", name: "我的寶貝，你也喜歡", type: "food", loc: "和平樓 1F", desc: "文具、玩具、髮飾、娃娃，二手物及全新物品、彈珠汽水、糖葫蘆、奶酪、紅茶、爆米花、多肉植物", video: "https://youtu.be/uRKhqddniZ8" },
            { cls: "204", name: "歡樂屋", type: "food", loc: "信義樓 1F", desc: "越南春捲、豆干、義式布丁、銅鑼燒、二手玩具、遊戲卡、書、拼圖、小球過河、百發百中、摺紙、輕黏土DIY" }
        ];

        const grid = document.getElementById('boothGrid');
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const pills = document.querySelectorAll('.pill');

        function renderBooths(filterGrade = 'all', searchText = '') {
            grid.innerHTML = '';

            const filtered = booths.filter(b => {
                let matchGrade = false;
                if (filterGrade === 'all') {
                    matchGrade = true;
                } else if (filterGrade === 'other') {
                    // 非 1~6 年級的班級（幼兒園、家長會、資源班、資優班等）
                    matchGrade = isNaN(parseInt(b.cls)) || parseInt(b.cls) < 100 || parseInt(b.cls) >= 700;
                } else {
                    // 年級篩選：班號首位數字 = 年級
                    const num = parseInt(b.cls);
                    matchGrade = !isNaN(num) && String(num).charAt(0) === filterGrade;
                }
                const matchText = b.name.includes(searchText) || b.cls.includes(searchText) || (b.desc && b.desc.includes(searchText));
                return matchGrade && matchText;
            });

            // 按年級排序：數字班級按號碼，非數字班級自訂順序（幼兒園→資優班→資源班→家長會最後）
            const otherOrder = {"幼兒園太陽班":9001,"幼兒園藍天班":9002,"幼兒園彩虹班":9003,"幼兒園雲朵班":9004,"資優班":9005,"資源班":9006,"家長會":9999};
            filtered.sort((a, b) => {
                const numA = parseInt(a.cls) || (otherOrder[a.cls] ?? 9998);
                const numB = parseInt(b.cls) || (otherOrder[b.cls] ?? 9998);
                return numA - numB;
            });

            if(filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; padding:20px;">找不到相關攤位 🥲</div>';
                return;
            }

            filtered.forEach(b => {
                let typeLabel = b.type === 'food' ? '美食' : (b.type === 'game' ? '遊戲' : '好物');
                let typeClass = `type-${b.type}`;

                const card = document.createElement('div');
                card.className = `booth-card ${typeClass}`;

                const videoBtn = b.video ? `<a href="${b.video}" target="_blank" class="video-btn" onclick="event.stopPropagation()">▶ 觀看影片</a>` : '';
                const posterImg = b.img ? `<img src="${b.img}" alt="${b.cls} 海報" class="booth-poster" onclick="event.stopPropagation(); showPoster(this.src)">` : '';

                card.innerHTML = `
                    <div class="booth-header">
                        <span class="booth-class">${b.cls}</span>
                        <span class="booth-tag">${typeLabel}</span>
                    </div>
                    <h3>${b.name}</h3>
                    ${posterImg}
                    ${b.desc ? `<p class="booth-desc">${b.desc}</p>` : ''}
                    ${videoBtn}
                    <p class="booth-loc">📍 ${b.loc}</p>
                `;

                if (b.video) {
                    card.style.cursor = 'pointer';
                    card.addEventListener('click', () => window.open(b.video, '_blank'));
                }

                grid.appendChild(card);
            });
        }

        // Init
        renderBooths();

        // Debounce 工具函式
        function debounce(fn, delay) {
            let timer;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // Search Listener（含 debounce）
        const debouncedSearch = debounce((value) => {
            const activePill = document.querySelector('.pill.active');
            renderBooths(activePill.dataset.filter, value);
        }, 200);

        searchInput.addEventListener('input', (e) => {
            // 即時更新清除按鈕顯示狀態
            searchClear.classList.toggle('show', e.target.value.length > 0);
            debouncedSearch(e.target.value);
        });

        // 清除搜尋按鈕
        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchClear.classList.remove('show');
            const activePill = document.querySelector('.pill.active');
            renderBooths(activePill.dataset.filter, '');
            searchInput.focus();
        });

        // Filter Listener
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                renderBooths(pill.dataset.filter, searchInput.value);
            });
        });

        // Countdown Logic — 加入分鐘顯示 + 倒數結束處理
        const targetDate = new Date("2026-03-28T09:00:00").getTime();

        // Auto-switch to Event Mode on 2026/03/28
        const today = new Date();
        const isEventDay = today.getFullYear() === 2026 && today.getMonth() === 2 && today.getDate() === 28;

        if (isEventDay) {
            document.body.classList.add('event-day-mode');
            document.querySelector('.marquee-strip p').innerText = "📢 活動進行中！歡迎蒞臨 114 學年度親職教育日！請多利用下方地圖與攤位搜尋！";
        }

        // 活動日程 - 只在活動當天(3/28)才高亮對應時段
        function highlightCurrentSlot() {
            const now = new Date();
            if (!(now.getFullYear() === 2026 && now.getMonth() === 2 && now.getDate() === 28)) return;
            const hhmm = now.getHours() * 60 + now.getMinutes();
            const items = document.querySelectorAll('.t-item[data-start]');
            items.forEach(item => {
                const [sh, sm] = item.dataset.start.split(':').map(Number);
                const [eh, em] = item.dataset.end.split(':').map(Number);
                const startMin = sh * 60 + sm;
                const endMin = eh * 60 + em;
                item.classList.remove('t-now', 't-done', 't-upcoming');
                if (hhmm >= startMin && hhmm < endMin) {
                    item.classList.add('t-now');
                } else if (hhmm >= endMin) {
                    item.classList.add('t-done');
                } else {
                    item.classList.add('t-upcoming');
                }
            });
        }
        highlightCurrentSlot();
        setInterval(highlightCurrentSlot, 30000);

        setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance > 0) {
                document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            } else {
                // 倒數結束 — 顯示「活動開始」
                const container = document.getElementById("countdownContainer");
                container.innerHTML = '<div class="time-block"><span class="number" style="font-size:1.2rem;">🎉 活動開始！</span></div>';
            }
        }, 1000);

        // Modal Logic
        function openMap() { document.getElementById('mapModal').style.display = 'flex'; }
        function closeMap() { document.getElementById('mapModal').style.display = 'none'; }

        // Parallax Effect (Background) — 修正選擇器為 .parallax-layer
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            document.querySelectorAll('.parallax-layer').forEach((el, index) => {
                const speed = (index + 1) * 0.1;
                el.style.transform = `translateY(${scrolled * speed}px)`;
            });
        });

        // 回到頂部按鈕邏輯
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        });
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
